<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Hot Isle Cold Isle</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        position: fixed;
        top: 0;
        left: 0;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* dynamic viewport height - accounts for mobile browser chrome */
        position: fixed;
        top: 0;
        left: 0;
      }
      #game-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      /* Rotate prompt for portrait on mobile */
      #rotate-prompt {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #1a1a2e;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #90a4ae;
        font-family: monospace;
        text-align: center;
        padding: 20px;
      }
      #rotate-prompt .icon { font-size: 48px; margin-bottom: 16px; }
      #rotate-prompt .msg { font-size: 16px; }
      #rotate-prompt .dismiss { 
        margin-top: 20px; 
        font-size: 14px; 
        color: #4fc3f7; 
        cursor: pointer;
        border: 1px solid #4fc3f7;
        padding: 8px 16px;
        border-radius: 4px;
      }
      @media (orientation: portrait) and (max-width: 768px) {
        #rotate-prompt { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="rotate-prompt">
      <div class="icon">📱↻</div>
      <div class="msg">Rotate your device to landscape for the best experience</div>
      <div class="dismiss" onclick="this.parentElement.style.display='none'">Play anyway</div>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
